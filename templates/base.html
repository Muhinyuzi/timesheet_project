<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Timesheet{% endblock %}</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        .navbar {
            background: #e5e5e5;
            border-bottom: 1px solid #777;
            padding: 12px 20px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .navbar a {
            text-decoration: none;
            color: #000;
            font-weight: bold;
        }

        .navbar .right {
            margin-left: auto;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .page-wrapper {
            padding: 20px;
        }

        .logout-form {
            display: inline;
            margin: 0;
        }

        .logout-form button {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            font: inherit;
            font-weight: bold;
            cursor: pointer;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="navbar">
        {% if request.user.is_authenticated %}
            <a href="{% url 'dashboard' %}">Accueil</a>
        {% endif %}

        <div class="right">
            {% if request.user.is_authenticated %}
                <span>{{ request.user.username }}</span>

                <form method="post" action="{% url 'logout' %}" class="logout-form">
                    {% csrf_token %}
                    <button type="submit">Déconnexion</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Connexion</a>
            {% endif %}
        </div>
    </div>

    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
